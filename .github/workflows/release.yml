name: Release Mihon Recs

on:
  push:
    tags:
      - 'v*'

env:
  MIHON_GITHUB_RELEASE: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'komichiakebi74-source/mihon-author-recommendation-ver'
    name: Build signed release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Check signing secrets
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY"
          test -n "$KEY_STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"

      - name: Check and build
        run: ./gradlew spotlessCheck testDebugUnitTest verifySqlDelightMigration assembleRelease
        env:
          storeFileBase64: ${{ secrets.SIGNING_KEY }}
          storePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyAlias: ${{ secrets.ALIAS }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Prepare release assets
        run: |
          set -euo pipefail
          cp app/build/outputs/apk/release/app-universal-release.apk "Mihon-Recs-${GITHUB_REF_NAME}.apk"
          sha256sum "Mihon-Recs-${GITHUB_REF_NAME}.apk" > "Mihon-Recs-${GITHUB_REF_NAME}.apk.sha256"

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: Mihon Recs ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            Mihon-Recs-${{ github.ref_name }}.apk
            Mihon-Recs-${{ github.ref_name }}.apk.sha256
